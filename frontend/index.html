<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Cattle Breed Recognition</title>
	<style>
		body {
			font-family: "Segoe UI", Tahoma, sans-serif;
			margin: 0;
			background: #f4f7fb;
			color: #1f2937;
		}
		.container {
			max-width: 720px;
			margin: 40px auto;
			background: #ffffff;
			border-radius: 12px;
			padding: 24px;
			box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
		}
		h1 {
			margin-top: 0;
			font-size: 28px;
		}
		.row {
			margin: 14px 0;
		}
		button {
			background: #0f766e;
			color: white;
			border: none;
			padding: 10px 16px;
			border-radius: 8px;
			cursor: pointer;
		}
		button:disabled {
			opacity: 0.5;
			cursor: not-allowed;
		}
		#result {
			margin-top: 16px;
			background: #ecfeff;
			border: 1px solid #99f6e4;
			padding: 12px;
			border-radius: 8px;
			min-height: 28px;
		}
	</style>
</head>
<body>
	<div class="container">
		<h1>Cattle Breed Recognition</h1>
		<p>Upload an image and get a predicted breed.</p>

		<div class="row">
			<input type="file" id="imageInput" accept="image/png, image/jpeg" />
		</div>

		<div class="row">
			<button id="predictBtn">Predict</button>
		</div>

		<div id="result">Result will appear here...</div>
	</div>

	<script src="script.js"></script>
</body>
</html>
